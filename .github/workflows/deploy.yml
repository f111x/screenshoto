name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build with next-on-pages
        run: npx @cloudflare/next-on-pages

      - name: Set Cloudflare env vars
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/e54c8dcb1abbec24d75b5d5471c7c502/pages/projects/screenshoto" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"deployment_configs":{"production":{"env_vars":{"AI_PROVIDER":{"type":"plain_text","value":"moonshot"},"AI_MODEL":{"type":"plain_text","value":"moonshot-v1-8k-vision"},"AI_API_KEY":{"type":"secret_text","value":"${{ secrets.AI_API_KEY }}"}}}}}'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e54c8dcb1abbec24d75b5d5471c7c502
          command: pages deploy .vercel/output/static --project-name=screenshoto
